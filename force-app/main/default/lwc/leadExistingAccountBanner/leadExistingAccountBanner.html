<template>
  <template if:true={showBanner}>
    <div class="slds-notify slds-notify_alert slds-alert_warning" role="alert">
      <span class="slds-assistive-text">Warning</span>
      <div class="slds-grid slds-grid_vertical-align-center slds-gutters">
        <div class="slds-col">
          <strong>Existing Candidate Found:</strong>
          This lead matches an existing Person Account —
          <a href={info.accountUrl} target="_blank">{info.accountName}</a>
        </div>
      </div>
    </div>
  </template>

  <template if:true={error}>
    <div class="slds-text-color_error slds-p-around_small">
      Couldn’t check existing account. Verify Apex + field permissions.
    </div>
  </template>
</template>
