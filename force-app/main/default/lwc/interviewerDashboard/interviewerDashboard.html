<template>
    <div class="tf-dashboard">

        <template if:true={isLoading}>
            <div class="tf-loader">
                <div class="tf-loader__ring"></div>
                <span>Loading dashboard...</span>
            </div>
        </template>

        <template if:false={isLoading}>

            <header class="tf-header">
                <div class="tf-header__brand">
                    <div class="tf-header__logo-img">
                        <img src="https://res.cloudinary.com/dgy7mvhnm/image/upload/w_200,h_80,c_fit/v1773805978/talentforce_logo_header_4k_wmbyal.png"
                            alt="TalentForce"
                            height="38" />
                    </div>
                    <div>
                        <div class="tf-header__eyebrow">TalentForce Recruit</div>
                        <div class="tf-header__title">Interviewer Home Page</div>
                    </div>
                </div>
                <div class="tf-header__actions">
                    <button class="tf-btn tf-btn--ghost" onclick={handleRefresh}>
                        &#8635; Refresh
                    </button>
                    <button class="tf-btn tf-btn--primary" onclick={handleViewInterviews}>
                        My Interviews
                    </button>
                </div>
            </header>

            <div class="tf-kpi-row">
                <div class="tf-kpi tf-kpi--blue">
                    <div class="tf-kpi__accent"></div>
                    <div class="tf-kpi__icon">&#9672;</div>
                    <div class="tf-kpi__body">
                        <div class="tf-kpi__value">{stats.upcomingInterviews}</div>
                        <div class="tf-kpi__label">Upcoming Interviews</div>
                    </div>
                </div>
                <div class="tf-kpi tf-kpi--teal">
                    <div class="tf-kpi__accent"></div>
                    <div class="tf-kpi__icon">&#9719;</div>
                    <div class="tf-kpi__body">
                        <div class="tf-kpi__value">{stats.completedThisMonth}</div>
                        <div class="tf-kpi__label">Completed This Month</div>
                    </div>
                </div>
                <div class="tf-kpi tf-kpi--orange">
                    <div class="tf-kpi__accent"></div>
                    <div class="tf-kpi__icon">&#10022;</div>
                    <div class="tf-kpi__body">
                        <div class="tf-kpi__value">{stats.pendingScores}</div>
                        <div class="tf-kpi__label">Pending Scores</div>
                    </div>
                </div>
                <div class="tf-kpi tf-kpi--green">
                    <div class="tf-kpi__accent"></div>
                    <div class="tf-kpi__icon">&#10003;</div>
                    <div class="tf-kpi__body">
                        <div class="tf-kpi__value">{stats.recommended}</div>
                        <div class="tf-kpi__label">Recommended This Month</div>
                    </div>
                </div>
            </div>

            <div class="tf-grid">

                <div class="tf-col">
                    <div class="tf-card">
                        <div class="tf-card__header">
                            <span class="tf-card__dot tf-card__dot--teal"></span>
                            <h2 class="tf-card__title">Today's Interviews</h2>
                            <span class="tf-badge tf-badge--teal">{todaysInterviews.length}</span>
                        </div>
                        <template if:true={todaysInterviews.length}>
                            <template for:each={todaysInterviews} for:item="iv">
                                <div key={iv.id} class="tf-interview">
                                    <div class="tf-interview__time">{iv.timeLabel}</div>
                                    <div class="tf-interview__body">
                                        <div class="tf-interview__name">{iv.candidateName}</div>
                                        <div class="tf-interview__meta">{iv.type} — {iv.role}</div>
                                    </div>
                                    <span class="tf-type-pill">{iv.type}</span>
                                </div>
                            </template>
                        </template>
                        <template if:false={todaysInterviews.length}>
                            <div class="tf-empty">No interviews scheduled today.</div>
                        </template>
                    </div>

                    <div class="tf-card">
                        <div class="tf-card__header">
                            <span class="tf-card__dot tf-card__dot--orange"></span>
                            <h2 class="tf-card__title">Alerts</h2>
                            <span class="tf-badge">{alerts.length}</span>
                        </div>
                        <template if:true={alerts.length}>
                            <template for:each={alerts} for:item="alert">
                                <div key={alert.id} class="tf-alert">
                                    <span class="tf-alert__icon">!</span>
                                    <span class="tf-alert__msg">{alert.message}</span>
                                </div>
                            </template>
                        </template>
                        <template if:false={alerts.length}>
                            <div class="tf-empty">&#10003; No alerts right now</div>
                        </template>
                    </div>
                </div>

                <div class="tf-col">
                    <div class="tf-card">
                        <div class="tf-card__header">
                            <span class="tf-card__dot tf-card__dot--blue"></span>
                            <h2 class="tf-card__title">Upcoming This Week</h2>
                        </div>
                        <template if:true={upcomingInterviews.length}>
                            <template for:each={upcomingInterviews} for:item="iv">
                                <div key={iv.id} class="tf-row">
                                    <div class="tf-row__avatar">{iv.initials}</div>
                                    <div class="tf-row__body">
                                        <div class="tf-row__name">{iv.candidateName}</div>
                                        <div class="tf-row__sub">{iv.type} — {iv.role}</div>
                                    </div>
                                    <span class="tf-stage-pill">{iv.dateLabel}</span>
                                </div>
                            </template>
                        </template>
                        <template if:false={upcomingInterviews.length}>
                            <div class="tf-empty">No upcoming interviews this week.</div>
                        </template>
                    </div>

                    <div class="tf-card">
                        <div class="tf-card__header">
                            <span class="tf-card__dot tf-card__dot--orange"></span>
                            <h2 class="tf-card__title">Pending Scores</h2>
                            <span class="tf-badge">{pendingScores.length}</span>
                        </div>
                        <template if:true={pendingScores.length}>
                            <template for:each={pendingScores} for:item="item">
                                <div key={item.id} class="tf-row">
                                    <div class="tf-row__avatar tf-row__avatar--gold">{item.initials}</div>
                                    <div class="tf-row__body">
                                        <div class="tf-row__name">{item.candidateName}</div>
                                        <div class="tf-row__sub">{item.type} — {item.dateLabel}</div>
                                    </div>
                                    <span class="tf-urgent-badge">Score Needed</span>
                                </div>
                            </template>
                        </template>
                        <template if:false={pendingScores.length}>
                            <div class="tf-empty">&#10003; All interviews scored</div>
                        </template>
                    </div>
                </div>

                <div class="tf-col">
                    <div class="tf-card">
                        <div class="tf-card__header">
                            <span class="tf-card__dot tf-card__dot--blue"></span>
                            <h2 class="tf-card__title">Quick Actions</h2>
                        </div>
                        <div class="tf-actions">
                            <button class="tf-action-btn tf-action-btn--primary" onclick={handleViewInterviews}>
                                <span class="tf-action-btn__icon">&#9719;</span>
                                <span>My Interviews</span>
                            </button>
                            <button class="tf-action-btn" onclick={handleScoreInterview}>
                                <span class="tf-action-btn__icon">&#10022;</span>
                                <span>Score an Interview</span>
                            </button>
                            <button class="tf-action-btn" onclick={handleViewCandidates}>
                                <span class="tf-action-btn__icon">&#9672;</span>
                                <span>View Candidates</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>

        </template>
    </div>
</template>
