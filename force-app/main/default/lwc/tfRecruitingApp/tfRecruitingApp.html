<template>
  <div class="container">

    <!-- Header section -->
    <div class="sectionHeader">
      <div class="headerTop">
        <div>
          <div class="kicker">TalentForce Recruiting Portal</div>
          <h2 class="title">Manage your application journey</h2>
          <p class="subtitle">
            Browse open opportunities, submit your application, and track your progress.
          </p>
        </div>

        <div class="tabs">
          <button class={homeTabClass} onclick={goHome}>Home</button>
          <button class={jobsTabClass} onclick={goJobs}>Jobs</button>
          <button class={trackTabClass} onclick={goTrack}>Track</button>
        </div>
      </div>
    </div>

    <!-- HOME -->
    <template if:true={isHome}>
      <div class="cardsGrid">

        <div class="featureCard">
          <div class="cardIcon">🔍</div>

          <div class="cardContent">
            <h3>Explore Opportunities</h3>
            <p>
              Browse open positions across departments and locations.
              Discover opportunities that match your expertise.
            </p>

            <button class="primaryBtn" onclick={goJobs}>
              Browse Jobs
            </button>
          </div>
        </div>

        <div class="featureCard">
          <div class="cardIcon">📝</div>

          <div class="cardContent">
            <h3>Quick Application</h3>
            <p>
              Submit your application through our streamlined process.
              It takes only a few minutes.
            </p>

            <span class="cardHint">
              Select a job first to apply.
            </span>
          </div>
        </div>

        <div class="featureCard">
          <div class="cardIcon">📊</div>

          <div class="cardContent">
            <h3>Track Application</h3>
            <p>
              Monitor your recruitment progress and stay updated with
              your application status.
            </p>

            <button class="secondaryBtn" onclick={goTrack}>
              Track Status
            </button>
          </div>
        </div>

      </div>

      <!-- CTA Banner -->
      <div class="ctaBanner">

        <div>
          <div class="ctaTitle">Start your career journey today</div>
          <div class="ctaSub">
            Explore our latest opportunities and join our team.
          </div>
        </div>

        <button class="ctaButton" onclick={goJobs}>
          Browse Open Jobs
        </button>

      </div>
    </template>

    <!-- JOBS -->
    <template if:true={isJobs}>
      <div class="panel">
        <h3>Available Positions</h3>
        <p class="panelSub">
          Job listings will appear here in the next step.
        </p>
      </div>
    </template>

    <!-- TRACK -->
    <template if:true={isTrack}>
      <div class="panel">

        <h3>Track Your Application</h3>

        <p class="panelSub">
          Enter your email and reference code to check your application status.
        </p>

        <div class="trackForm">
          <input class="input" placeholder="Email address"/>
          <input class="input" placeholder="Application reference"/>
          <button class="primaryBtn">Track</button>
        </div>

      </div>
    </template>

  </div>
</template>
