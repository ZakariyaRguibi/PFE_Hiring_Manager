<template>
  <div class="wrap">

    <!-- SEARCH -->
    <section class="searchCard">
      <div class="searchTitle">Search jobs</div>
      <div class="searchSub">Find open roles by keyword, location and department.</div>

      <div class="searchGrid">
        <div class="field">
          <label>Keyword</label>
          <input class="input" placeholder="e.g., Data Analyst, Java, Marketing…" value={keyword} oninput={onKeyword}/>
        </div>

        <div class="field">
          <label>Location</label>
          <input class="input" placeholder="e.g., Casablanca, Rabat, Remote…" value={location} oninput={onLocation}/>
        </div>

        <div class="field">
          <label>Department</label>
          <select class="select" value={department} onchange={onDepartment}>
            <option value="">All departments</option>
            <template for:each={departmentOptions} for:item="d">
              <option key={d.value} value={d.value}>{d.label}</option>
            </template>
          </select>
        </div>

        <div class="field actions">
          <button class="btn primary" onclick={goJobs}>Search</button>
          <button class="btn ghost" onclick={clear}>Clear</button>
        </div>
      </div>
    </section>

    <!-- FEATURED JOBS -->
    <section class="section">
      <div class="sectionHeader">
        <div>
          <h3>Featured open positions</h3>
          <p class="muted">Latest opportunities with status <b>Open</b>.</p>
        </div>
        <a class="link" href="/recruitemntportal/s/jobs">View all →</a>
      </div>

      <template if:true={loadingJobs}>
        <div class="hint">Loading jobs…</div>
      </template>
      <template if:true={jobsError}>
        <div class="error">{jobsError}</div>
      </template>

      <div class="jobsGrid">
        <template for:each={featuredJobs} for:item="job">
          <article key={job.Id} class="jobCard">
            <div class="jobTop">
              <div class="jobTitle">{job.Name}</div>
              <span class="pill">Open</span>
            </div>

            <div class="jobMeta">
              <span>{job.Location__c}</span>
              <span class="dot">•</span>
              <span>{job.Department__c}</span>
              <span class="dot">•</span>
              <span>{job.Employment_Type__c}</span>
            </div>

            <div class="jobActions">
              <a class="btn small" href={job.link}>View</a>
            </div>
          </article>
        </template>
      </div>

      <template if:true={noJobs}>
        <div class="hint">No open jobs found.</div>
      </template>
    </section>

    <!-- HOW IT WORKS -->
    <section class="section" id="how">
      <div class="sectionHeader">
        <div>
          <h3>How it works</h3>
          <p class="muted">A simple, transparent recruitment experience.</p>
        </div>
      </div>

      <div class="stepsGrid">
        <div class="stepCard">
          <div class="stepNum">1</div>
          <div class="stepTitle">Browse</div>
          <div class="muted">Explore open roles and filter by department & location.</div>
        </div>

        <div class="stepCard">
          <div class="stepNum">2</div>
          <div class="stepTitle">Apply</div>
          <div class="muted">Complete a short form and submit your application.</div>
        </div>

        <div class="stepCard">
          <div class="stepNum">3</div>
          <div class="stepTitle">Track</div>
          <div class="muted">Use the portal to follow your application status.</div>
        </div>
      </div>
    </section>

    <!-- CTA -->
    <section class="cta">
      <div>
        <div class="ctaTitle">Ready to apply?</div>
        <div class="ctaSub">Browse open positions and submit your application in minutes.</div>
      </div>
      <a class="btn accent" href="/recruitemntportal/s/jobs">Browse Open Jobs</a>
    </section>

  </div>
</template>
