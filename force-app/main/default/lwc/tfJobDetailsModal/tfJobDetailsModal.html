<template>
  <section class="backdrop" onclick={closeIfBackdrop}>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="header">
        <div>
          <div class="kicker">Job Details</div>
          <h2 class="title">{job.Name}</h2>

          <div class="meta">
            <span>{job.Location__c}</span>
            <span class="dot">•</span>
            <span>{job.Department__c}</span>
            <span class="dot">•</span>
            <span>{job.Employment_Type__c}</span>
          </div>
        </div>

        <button class="iconBtn" onclick={close} aria-label="Close">✕</button>
      </div>

      <div class="body">
        <template if:true={loading}>
          <div class="hint">Loading job details…</div>
        </template>

        <template if:true={error}>
          <div class="error">{error}</div>
        </template>

        <template if:true={jobReady}>
          <div class="grid">
            <div class="card">
              <div class="cardTitle">Requirements</div>

              <div class="row">
                <span class="label">Min years experience</span>
                <span class="value">{job.Min_Years_Experience__c}</span>
              </div>

              <div class="row">
                <span class="label">Education required</span>
                <span class="value">{job.Education_Required__c}</span>
              </div>

              <div class="note">
                These requirements help us match candidates to roles efficiently.
              </div>
            </div>

            <div class="card">
              <div class="cardTitle">Target skills</div>
              <div class="skills">{job.Target_Skills__c}</div>
            </div>
          </div>

          <div class="callout">
            <div>
              <div class="calloutTitle">Ready to apply?</div>
              <div class="calloutSub">Submit your application in a few minutes.</div>
            </div>
            <button class="btn accent" onclick={apply}>Apply</button>
          </div>
        </template>
      </div>

      <div class="footer">
        <button class="btn ghost" onclick={close}>Close</button>
        <button class="btn primary" onclick={apply}>Apply</button>
      </div>
    </div>
  </section>
</template>
