<template>
    <!-- Chat Bubble Button -->
    <div class="chat-bubble" onclick={toggleChat}>
        <template if:true={isChatOpen}>
            <span>✕</span>
        </template>
        <template if:false={isChatOpen}>
            <span>💬</span>
        </template>
    </div>

    <!-- Chat Window -->
    <template if:true={isChatOpen}>
        <div class="chat-window">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-avatar">🤖</div>
                <div class="header-info">
                    <div class="header-name">TalentForce Assistant</div>
                    <div class="header-status">● Online</div>
                </div>
            </div>

            <!-- Messages -->
            <div class="chat-messages" lwc:ref="messageContainer">
                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.containerClass}>
                        <div class={msg.bubbleClass}>
                            <lightning-formatted-text value={msg.text}></lightning-formatted-text>
                        </div>
                        <div class="msg-time">{msg.time}</div>
                    </div>
                </template>

                <!-- Typing indicator -->
                <template if:true={isTyping}>
                    <div class="msg-container bot-container">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Quick Replies -->
            <template if:true={showQuickReplies}>
                <div class="quick-replies">
                    <button class="quick-reply-btn" onclick={handleQuickReply} data-message="What jobs match my profile?">💼 Job Matches</button>
                    <button class="quick-reply-btn" onclick={handleQuickReply} data-message="What is my application status?">📊 My Status</button>
                    <button class="quick-reply-btn" onclick={handleQuickReply} data-message="What are my upcoming interviews?">📅 Interviews</button>
                    <button class="quick-reply-btn" onclick={handleQuickReply} data-message="How do I prepare for my HR interview?">🎯 Prep Tips</button>
                </div>
            </template>

            <!-- Input -->
            <div class="chat-input-area">
                <input
                    type="text"
                    class="chat-input"
                    placeholder="Type your message..."
                    value={currentMessage}
                    onkeyup={handleKeyUp}
                    oninput={handleInput}
                />
                <button class="send-btn" onclick={sendMessage}>
                    ➤
                </button>
            </div>
        </div>
    </template>
</template>
