<template>
    <lightning-card title="Qualification Status" icon-name="standard:lead">
        <div class="wrapper">
            <div class="topSection">
                <span class={badgeClass}>{qualificationStatusLabel}</span>
            </div>

            <div class="details">
                <div class="detailRow">
                    <span class="label">Lead Status</span>
                    <span class="value">{leadStatus}</span>
                </div>

                <div class="detailRow">
                    <span class="label">Applied Job</span>
                    <span class="value">{jobPositionName}</span>
                </div>

                <div class="detailRow">
                    <span class="label">Recommendation</span>
                    <span class={messageClass}>{recommendationMessage}</span>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
