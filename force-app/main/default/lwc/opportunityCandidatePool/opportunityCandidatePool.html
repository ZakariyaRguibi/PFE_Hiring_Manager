<template>
    <lightning-card title="Candidate Pipeline" icon-name="standard:opportunity">

        <template if:true={isLoading}>
            <lightning-spinner size="medium"></lightning-spinner>
        </template>

        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_medium">
                {errorMessage}
            </div>
        </template>

        <template if:true={hasData}>

            <div class="job-title slds-p-around_medium">
                {jobPositionName}
            </div>

            <!-- 🔥 FIXED GRID -->
            <div class="stats-grid slds-p-around_medium">
                <div class="stat-card">
                    <div class="stat-label">Total</div>
                    <div class="stat-value">{totalApplicants}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Open</div>
                    <div class="stat-value">{openPositions}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Filled</div>
                    <div class="stat-value">{filledPositions}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Remaining</div>
                    <div class="stat-value">{remainingPositions}</div>
                </div>
            </div>

            <div class="sections slds-p-around_medium">

                <!-- Accepted -->
                <div class="section-card">
                    <div class="section-header">Accepted ({acceptedPool.length})</div>
                    <template for:each={acceptedPool} for:item="c">
                        <div key={c.id} class="candidate-row">
                            <a href={c.recordUrl}>{c.name}</a>
                        </div>
                    </template>
                </div>

                <!-- Shortlisted -->
                <div class="section-card">
                    <div class="section-header">Shortlisted ({shortlisted.length})</div>
                    <template for:each={shortlisted} for:item="c">
                        <div key={c.id} class="candidate-row">
                            <a href={c.recordUrl}>{c.name}</a>
                        </div>
                    </template>
                </div>

                <!-- Hired -->
                <div class="section-card">
                    <div class="section-header">Hired ({hired.length})</div>
                    <template for:each={hired} for:item="c">
                        <div key={c.id} class="candidate-row">
                            <a href={c.recordUrl}>{c.name}</a>
                        </div>
                    </template>
                </div>

                <!-- Rejected -->
                <div class="section-card">
                    <div class="section-header">Rejected ({rejected.length})</div>
                    <template for:each={rejected} for:item="c">
                        <div key={c.id} class="candidate-row">
                            <a href={c.recordUrl}>{c.name}</a>
                        </div>
                    </template>
                </div>

            </div>

        </template>
    </lightning-card>
</template>
