<template>
    <div class="tf-container">

        <!-- Header -->
        <div class="tf-header">
            <div class="tf-header__left">
                <h1 class="tf-header__title">Job Positions</h1>
                <p class="tf-header__subtitle">{totalCount} position(s) found</p>
            </div>
            <div class="tf-header__actions">
                <div class="tf-search">
                    <svg class="tf-search__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input
                        class="tf-search__input"
                        type="text"
                        placeholder="Search positions..."
                        value={searchTerm}
                        oninput={handleSearch}
                    />
                </div>
                <div class="tf-filters">
                    <button class={getFilterClassAll} data-filter="All" onclick={handleFilter}>All</button>
                    <button class={getFilterClassOpen} data-filter="Open" onclick={handleFilter}>Open</button>
                    <button class={getFilterClassDraft} data-filter="Draft" onclick={handleFilter}>Draft</button>
                    <button class={getFilterClassClosed} data-filter="Closed" onclick={handleFilter}>Closed</button>
                </div>
                <lightning-button-icon
                    icon-name="utility:add"
                    variant="brand"
                    alternative-text="New Position"
                    title="New Position"
                    onclick={handleNew}
                    class="tf-btn-new"
                ></lightning-button-icon>
            </div>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="tf-loading">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template if:true={hasError}>
            <div class="tf-empty">
                <p>Something went wrong. Please refresh.</p>
            </div>
        </template>

        <!-- Cards Grid -->
        <template if:false={isLoading}>
            <template if:true={hasPositions}>
                <div class="tf-grid">
                    <template for:each={filteredPositions} for:item="pos">
                        <div key={pos.Id} class="tf-card" onclick={handleCardClick} data-id={pos.Id}>
                            <div class="tf-card__header">
                                <div class="tf-card__icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.07 15.93 0 13.36 0c-1.3 0-2.51.52-3.36 1.44L9 3 7.99 1.44C7.15.52 5.93 0 4.64 0 2.07 0 0 2.07 0 4.64c0 .48.11.92.18 1.36H0C0 8.46 2 9.54 2 12v8c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-8c0-2.46 2-3.54 2-6h-4zM7.5 4.25a.75.75 0 110-1.5.75.75 0 010 1.5z"/>
                                    </svg>
                                </div>
                                <span class={pos.statusClass}>{pos.Status__c}</span>
                            </div>
                            <div class="tf-card__body">
                                <h3 class="tf-card__title">{pos.Title__c}</h3>
                                <div class="tf-card__meta">
                                    <template if:true={pos.Department__c}>
                                        <span class="tf-card__tag">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                                                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                                            </svg>
                                            {pos.Department__c}
                                        </span>
                                    </template>
                                    <template if:true={pos.Required_Location__c}>
                                        <span class="tf-card__tag">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
                                            </svg>
                                            {pos.Required_Location__c}
                                        </span>
                                    </template>
                                </div>
                            </div>
                            <div class="tf-card__footer">
                                <div class="tf-card__stat">
                                    <span class="tf-card__stat-value">{pos.Open_Positions__c}</span>
                                    <span class="tf-card__stat-label">Open</span>
                                </div>
                                <div class="tf-card__stat">
                                    <span class="tf-card__stat-value">{pos.Filled_Positions__c}</span>
                                    <span class="tf-card__stat-label">Filled</span>
                                </div>
                                <div class="tf-card__stat">
                                    <span class="tf-card__stat-value">{pos.Desired_Hires__c}</span>
                                    <span class="tf-card__stat-label">Target</span>
                                </div>
                                <template if:true={pos.Application_Deadline__c}>
                                    <div class={pos.deadlineClass}>
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
                                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                                        </svg>
                                        {pos.deadlineLabel}
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Empty State -->
            <template if:false={hasPositions}>
                <div class="tf-empty">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
                        <circle cx="32" cy="32" r="30" stroke="#e8ecf0" stroke-width="2"/>
                        <path d="M20 32h24M32 20v24" stroke="#c8d0da" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <p class="tf-empty__title">No positions found</p>
                    <p class="tf-empty__sub">Try adjusting your search or filters</p>
                </div>
            </template>
        </template>

    </div>
</template>
